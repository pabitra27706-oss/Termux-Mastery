<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Termux-Mastery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Termux-Mastery',
      nameLink: '/',
      repo: 'https://github.com/pabitra27706-oss/Termux-Mastery',
      
      // This is the key fix
      // It tells Docsify to load files from the root of your repository
      basePath: 'https://raw.githubusercontent.com/pabitra27706-oss/Termux-Mastery/main/',
      
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      autoHeader: true,
      subMaxLevel: 2,
      
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search Termux-Mastery...',
        noData: 'No results found.',
        depth: 6,
      },
    };
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  
</body>

</html>
