<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termux-Mastery</title>

  <!-- Favicon (emojis work in all modern browsers) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">

  <!-- Docsify's theme stylesheet -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Custom CSS for dark mode toggle button -->
  <style>
    /* Light mode (default) */
    :root {
      --bg-color: #ffffff;
      --text-color: #34495e;
    }
    /* Dark mode */
    body.dark {
      --bg-color: #1e1e2f;
      --text-color: #f0f0f0;
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    body.dark .sidebar,
    body.dark .content,
    body.dark .app-nav {
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    /* Dark mode toggle button */
    .dark-mode-toggle {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 1000;
      background: var(--bg-color);
      border: 1px solid var(--text-color);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-color);
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <!-- Dark mode toggle button -->
  <button class="dark-mode-toggle" id="darkToggle">🌙 Dark</button>

  <script>
    // Set up Docsify
    window.$docsify = {
      name: 'Termux-Mastery',                // Your site title
      loadSidebar: true,                     // Load _sidebar.md
      loadCoverpage: true,                   // Load _coverpage.md (optional)
      search: {
        placeholder: 'Search',
        noData: 'No results',
        depth: 6
      },
      darkMode: false,                       // We'll handle dark mode ourselves
    };
  </script>

  <!-- Docsify core library and plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <!-- Dark mode toggle logic -->
  <script>
    (function() {
      var btn = document.getElementById('darkToggle');
      var body = document.body;

      // Check for saved preference
      if (localStorage.getItem('docsify-dark') === 'true') {
        body.classList.add('dark');
        btn.innerHTML = '☀️ Light';
      }

      btn.addEventListener('click', function() {
        if (body.classList.contains('dark')) {
          body.classList.remove('dark');
          btn.innerHTML = '🌙 Dark';
          localStorage.setItem('docsify-dark', 'false');
        } else {
          body.classList.add('dark');
          btn.innerHTML = '☀️ Light';
          localStorage.setItem('docsify-dark', 'true');
        }
      });
    })();
  </script>
</body>
</html>
